<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perbarindo DPD Jateng — Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2e3f;
    --accent: #4f7cff;
    --text: #e2e6f0;
    --muted: #6b7280;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    letter-spacing: -0.5px;
  }

  header h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.2px;
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    margin-left: 4px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 8px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s ease;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { background: #2a2e3f; color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    display: flex;
    gap: 6px;
    padding: 8px;
    overflow: hidden;
  }

  /* panel = wrapper for each iframe */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-width: 0;
    transition: flex .3s ease;
  }

  .panel-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #14172000;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-bot  { background: #ff6b6b; }
  .dot-rekap{ background: #ffd166; }
  .dot-input{ background: #06d6a0; }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    flex: 1;
  }

  .expand-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 13px; padding: 0 2px;
    transition: color .15s;
  }
  .expand-btn:hover { color: var(--text); }

  /* loader overlay */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    gap: 10px;
    z-index: 2;
    transition: opacity .3s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader p { font-size: 11px; color: var(--muted); }

  .iframe-wrap {
    flex: 1;
    position: relative;
  }

  iframe {
    width: 100%; height: 100%;
    border: none;
    background: #fff;
    display: block;
  }

  /* ── MOBILE: stacked ── */
  @media (max-width: 700px) {
    .main { flex-direction: column; }
    body { overflow: auto; }
    .panel { min-height: 420px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">P</div>
  <h1>Perbarindo DPD Jateng</h1>
  <span>— SK.01 · 2026-04-2130</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="setView('all',this)">⊞ Semua</button>
  <button class="tab-btn" onclick="setView('bot',this)">Bot</button>
  <button class="tab-btn" onclick="setView('rekap',this)">Rekap</button>
  <button class="tab-btn" onclick="setView('input',this)">Input</button>
</div>

<div class="main">

  <!-- BOT -->
  <div class="panel" id="panel-bot">
    <div class="panel-bar">
      <span class="dot dot-bot"></span>
      <span class="panel-label">Bot</span>
    </div>
    <div class="iframe-wrap">
      <div class="loader" id="load-bot">
        <div class="spinner"></div>
        <p>Memuat Bot…</p>
      </div>
      <iframe
        src="https://perbarindodpdjateng.github.io/Plt/2026/2026-04-2130_S.K.01_Bot.html"
        loading="lazy"
        onload="hideLoader('load-bot')"
        title="Bot"></iframe>
    </div>
  </div>

  <!-- REKAP -->
  <div class="panel" id="panel-rekap">
    <div class="panel-bar">
      <span class="dot dot-rekap"></span>
      <span class="panel-label">Rekap</span>
    </div>
    <div class="iframe-wrap">
      <div class="loader" id="load-rekap">
        <div class="spinner"></div>
        <p>Memuat Rekap…</p>
      </div>
      <iframe
        src="https://perbarindodpdjateng.github.io/Plt/2026/2026-04-2130_S.K.01_Rekap.html"
        loading="lazy"
        onload="hideLoader('load-rekap')"
        title="Rekap"></iframe>
    </div>
  </div>

  <!-- INPUT -->
  <div class="panel" id="panel-input">
    <div class="panel-bar">
      <span class="dot dot-input"></span>
      <span class="panel-label">Input</span>
    </div>
    <div class="iframe-wrap">
      <div class="loader" id="load-input">
        <div class="spinner"></div>
        <p>Memuat Input…</p>
      </div>
      <iframe
        src="https://perbarindodpdjateng.github.io/Plt/2026/2026-04-2130_S.K.01_Input.html"
        loading="lazy"
        onload="hideLoader('load-input')"
        title="Input"></iframe>
    </div>
  </div>

</div>

<script>
  function hideLoader(id) {
    const el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  }

  function setView(view, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const panels = { bot: 'panel-bot', rekap: 'panel-rekap', input: 'panel-input' };

    if (view === 'all') {
      Object.values(panels).forEach(id => {
        const p = document.getElementById(id);
        p.style.display = 'flex';
        p.style.flex = '1';
      });
    } else {
      Object.entries(panels).forEach(([key, id]) => {
        const p = document.getElementById(id);
        if (key === view) {
          p.style.display = 'flex';
          p.style.flex = '1';
        } else {
          p.style.display = 'none';
        }
      });
    }
  }
</script>
</body>
</html>
