<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Klim's Virtual Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS MODERN & EKSKLUSIF */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fb;
      background-image: radial-gradient(at 0% 0%, rgba(110, 93, 189, 0.08) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(124, 107, 199, 0.05) 0px, transparent 50%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px;
    }
    .chat-container {
      width: 100%; max-width: 420px; height: 85vh; background: #ffffff; border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .chat-header { padding: 18px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f3f6; }
    .bot-avatar {
      width: 40px; height: 40px; background: linear-gradient(135deg, #6e5dbd 0%, #4e3d9d 100%);
      border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(110, 93, 189, 0.2);
    }
    .header-info { flex: 1; }
    .header-title { font-weight: 700; font-size: 15px; color: #1a202c; }
    .header-subtitle { font-size: 11px; color: #4ade80; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .header-subtitle::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    .chat-messages { flex: 1; padding: 18px; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 13.5px; line-height: 1.5; animation: msgPop 0.3s ease-out; word-wrap: break-word; }
    @keyframes msgPop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user-message { background: #6e5dbd; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot-message { background: #f1f4f9; color: #334155; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bot-message a { color: #6e5dbd; font-weight: 600; text-decoration: underline; }
    .typing-indicator { display: none; padding: 10px 15px; gap: 4px; }
    .typing-indicator.active { display: flex; }
    .dot { width: 5px; height: 5px; background: #cbd5e1; border-radius: 50%; animation: bounce 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .chat-footer { padding: 15px; background: #fff; border-top: 1px solid #f0f3f6; }
    .quick-replies { display: flex; gap: 6px; padding-bottom: 12px; overflow-x: auto; }
    .quick-replies::-webkit-scrollbar { display: none; }
    .chip { padding: 7px 14px; background: #f1f4f9; border-radius: 10px; font-size: 12.5px; color: #6e5dbd; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.2s; }
    .chip:hover { background: #6e5dbd; color: #fff; }
    .input-box { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; background: #f8fafc; }
    .send-btn { width: 40px; height: 40px; background: #6e5dbd; border: none; border-radius: 10px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .timestamp { font-size: 10px; opacity: 0.4; margin-top: 5px; text-align: right; }
    .bot-message .timestamp { text-align: left; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="header-info">
      <div class="header-title">Klim's Assistant</div>
      <div class="header-subtitle">Online</div>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="chat-footer">
    <div class="quick-replies">
      <span class="chip" onclick="quickAction('6')">6</span>
      <span class="chip" onclick="quickAction('11')">11</span>
      <span class="chip" onclick="quickAction('50')">50</span>
      <span class="chip" onclick="quickAction('51')">51</span>
      <span class="chip" onclick="quickAction('52')">52</span>
      <span class="chip" onclick="quickAction('53')">53</span>
    </div>
    <div class="input-box">
      <input id="userInput" type="text" placeholder="Ketik kode..." autocomplete="off"/>
      <button class="send-btn" onclick="handleSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>

<script>
  // CONFIG SPREADSHEET (Sudah dikoreksi)
  const SHEET_ID = '1REf1Z_Bxp91X_FMcgiEHOwAHl-hwAm44YXHGIvw3aXY';
  const SHEET_NAME = 'Sheet1';
  
  let database = [];
  let isLoaded = false;

  // FUNGSI PENGAMBILAN DATA YANG DIPERBAIKI
  async function loadSheet() {
    // Menggunakan tqx=out:csv agar lebih ringan dan stabil daripada JSON gviz jika ada error format
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
    
    try {
      const resp = await fetch(url);
      const text = await resp.text();
      
      // Membersihkan parsing JSON dari Google
      const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      const data = JSON.parse(jsonStr);
      
      database = data.table.rows.map(r => ({
        code: (r.c[0]?.v ?? '').toString().toLowerCase().trim(),
        key: (r.c[1]?.v ?? '').toString().toLowerCase().trim(),
        ans: (r.c[2]?.v ?? '').toString().trim()
      })).filter(x => x.code || x.key);
      
      isLoaded = true;
      console.log("Koneksi Spreadsheet Berhasil. Total data:", database.length);
    } catch (e) {
      console.error("Gagal koneksi ke Spreadsheet:", e);
      isLoaded = false;
    }
  }

  function findResponse(input) {
    if (!isLoaded) return "Sistem sedang menghubungkan ke database, silakan tunggu sebentar...";
    
    const val = input.toLowerCase().trim();
    // Prioritas 1: Kode Eksak
    let match = database.find(item => item.code === val);
    
    // Prioritas 2: Keywords
    if (!match) {
      match = database.find(item => item.key.includes(val));
    }

    if (match) {
      // Mengubah URL teks menjadi link yang bisa diklik secara otomatis
      let response = match.ans;
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      response = response.replace(urlRegex, function(url) {
        return '<a href="' + url + '" target="_blank">' + url + '</a>';
      });
      return response.replace(/\n/g, '<br>');
    }
    
    return `Maaf, kode <b>${input}</b> belum tersedia. Mohon hubungi admin.`;
  }

  function addChat(text, type) {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${type === 'user' ? 'user-message' : 'bot-message'}`;
    div.innerHTML = text; // Menggunakan innerHTML agar link dan format HTML terbaca
    
    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    
    div.appendChild(time);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function process(input) {
    if(!input) return;
    addChat(input, 'user');
    
    const indicator = document.getElementById('typingIndicator');
    indicator.classList.add('active');

    // Jika data belum siap, coba load lagi
    if(!isLoaded) await loadSheet();
    
    setTimeout(() => {
      indicator.classList.remove('active');
      const reply = findResponse(input);
      addChat(reply, 'bot');
    }, 600);
  }

  function handleSend() {
    const inp = document.getElementById('userInput');
    if(inp.value) {
      process(inp.value);
      inp.value = '';
    }
  }

  function quickAction(code) {
    process(code);
  }

  document.getElementById('userInput').addEventListener('keypress', e => {
    if(e.key === 'Enter') handleSend();
  });

  window.onload = async () => {
    // Pesan Selamat Datang
    const welcome = `
      <div style="background: linear-gradient(135deg, #f8faff 0%, #ffffff 100%); border: 1px solid #e2e8f0; padding: 15px; border-radius: 20px;">
        <div style="font-weight:700; color:#4e3d9d; margin-bottom:8px;">👋 Semangat Pagi!</div>
        <div style="font-size:13px; color:#64748b; margin-bottom:10px;">Pilih menu atau ketik kode di bawah ini:</div>
        <div style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:12.5px;"><b>6</b> Publikasi Penyegaran</div>
        <div style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:12.5px;"><b>11</b> Cek Jatuh Tempo</div>
        <div style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:12.5px;"><b>50</b> Menu Utama</div>
        <div style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:12.5px;"><b>51</b> Surat Penyegaran</div>
        <div style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:12.5px;"><b>52</b> Jadwal Penyegaran</div>
        <div style="padding:6px 0; font-size:12.5px;"><b>53</b> Biaya Penyegaran</div>
      </div>
    `;
    addChat(welcome, 'bot');
    await loadSheet();
  };
</script>

</body>
</html>
