<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rekap Micro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:10px;background:#fff;color:#111;height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;align-items:center;padding:4px 6px;gap:4px;z-index:10}
input{flex:1;border:1px solid #d1d5db;border-radius:3px;padding:3px 5px;font-size:10px;outline:none}
input:focus{border-color:#2563eb}
main{flex:1;overflow:auto;padding:2px 4px}
table{width:100%;border-collapse:collapse}
th{background:#2563eb;color:#fff;font-weight:600;padding:4px 5px;font-size:11px;white-space:nowrap}
td{padding:2px 5px;font-size:10px;border-bottom:1px solid #e5e7eb;word-break:break-word}
tr.new td{background:#dbeafe;animation:f .6s forwards}
@keyframes f{from{background:#93c5fd}to{background:transparent}}
.pagebar{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;font-size:9px}
.pagebar button{border:1px solid #d1d5db;background:#fff;border-radius:2px;padding:2px 4px;font-size:9px}
.pagebar button:disabled{opacity:.5;cursor:not-allowed}
.loading{text-align:center;padding:4px;color:#6b7280;font-size:9px}
</style>
</head>
<body>

<header>
  <svg width="12" height="12" fill="none" stroke="#2563eb" stroke-width="2"><circle cx="4.5" cy="4.5" r="4"/><path d="m9 9-2.5-2.5"/></svg>
  <input id="filter" type="search" placeholder="Cari…" autocomplete="off">
</header>

<main>
  <p id="load" class="loading">Memuat…</p>
  <table id="tbl"><thead></thead><tbody></tbody></table>
  <div class="pagebar">
    <button id="prev">Prev</button>
    <span id="info"></span>
    <button id="next">Next</button>
  </div>
</main>

<script>
const EP = 'https://script.google.com/macros/s/AKfycbwqyEKtmGmBAmrK4q2Rpg3GHXvPF7LazO31o2viwuIwmrfPGu-sMC683b45mnbmb8zL/exec';
const ROWS = 10;
let raw = [], last = '', page = 1, pages = 1;
const $ = s => document.querySelector(s);
const $load = $('#load'), $head = $('thead'), $body = $('tbody'), $filter = $('#filter');
const $prev = $('#prev'), $next = $('#next'), $info = $('#info');

async function fetchData(){
  try{
    const res = await fetch(EP,{cache:'no-store'});
    const json = await res.json();
    const sum = JSON.stringify(json);
    if(sum === last) return;
    last = sum; raw = json;
    $load.style.display='none';
    paginate();
  }catch(e){ $load.textContent='Gagal'; }
}
function paginate(){
  const key = $filter.value.trim().toLowerCase();
  const fil = raw.filter((r,i)=> i===0 || r.join(' ').toLowerCase().includes(key) );
  pages = Math.max(1, Math.ceil((fil.length-1)/ROWS));
  page = Math.min(page, pages);
  render(fil);
}
function render(list){
  const start = (page-1)*ROWS +1;
  const slice = [list[0], ...list.slice(start, start+ROWS) ];
  const prevSet = new Set(JSON.parse(sessionStorage.getItem('prev')||'[]'));
  $head.innerHTML=''; $body.innerHTML='';
  const fH=document.createDocumentFragment(), fB=document.createDocumentFragment();
  slice.forEach((row,i)=>{
    const tr=document.createElement('tr');
    row.forEach(cell=>{
      const el=document.createElement(i===0?'th':'td');
      el.textContent=cell; tr.appendChild(el);
    });
    (i===0?fH:fB).appendChild(tr);
    if(i>0 && !prevSet.has(JSON.stringify(row))) tr.classList.add('new');
  });
  $head.appendChild(fH); $body.appendChild(fB);
  sessionStorage.setItem('prev',JSON.stringify(list.slice(1).map(r=>JSON.stringify(r))));
  $prev.disabled = page<=1; $next.disabled = page>=pages;
  $info.textContent = `Hal ${page}/${pages}`;
}
$prev.onclick = ()=> { if(page>1){page--; paginate();} };
$next.onclick = ()=> { if(page<pages){page++; paginate();} };
let t; $filter.oninput = ()=>{clearTimeout(t);t=setTimeout(()=>{page=1;paginate();},150)};
fetchData(); setInterval(fetchData,5000);
</script>
</body>
</html>
