<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daftar Hadir</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A1628;
    --blue: #1A56DB;
    --surface: #F8FAFF;
    --white: #FFFFFF;
    --text: #1E293B;
    --muted: #64748B;
    --border: #E2E8F0;
    --success: #10B981;
    --accent: #F59E0B;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--navy); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text); }

  .header { background:var(--navy); padding:10px 20px 8px; text-align:center; }
  .header h1 { font-size:17px; font-weight:800; color:var(--white); line-height:1.2; }
  .header h2 { font-size:11px; font-weight:500; color:var(--white); margin-top:2px; }

  .card { background:var(--white); border-radius:16px 16px 0 0; padding:12px 14px 14px; height:calc(100vh - 62px); overflow-y:auto; }

  .field { margin-bottom:7px; }
  .field label { display:block; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
  .field label .req { color:#EF4444; }

  select, input[type="text"] {
    width:100%; background:var(--surface); border:1.5px solid var(--border);
    border-radius:8px; padding:7px 10px; font-size:13.5px;
    font-family:'Plus Jakarta Sans',sans-serif; color:var(--text);
    outline:none; appearance:none; -webkit-appearance:none;
    transition:border-color .2s, box-shadow .2s;
  }
  select:focus, input[type="text"]:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,86,219,.1); background:var(--white); }
  .select-wrap { position:relative; }
  .select-wrap::after { content:'▾'; position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:12px; }

  .radio-group { display:grid; gap:5px; }
  .radio-group.col2 { grid-template-columns:1fr 1fr; }
  .radio-group.col4 { grid-template-columns:1fr 1fr 1fr 1fr; }
  .radio-opt input { display:none; }
  .radio-opt label { display:flex; align-items:center; justify-content:center; padding:6px 4px; border:1.5px solid var(--border); border-radius:8px; font-size:12.5px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; text-align:center; line-height:1.2; }
  .radio-opt input:checked + label { border-color:var(--blue); background:#EFF6FF; color:var(--blue); font-weight:700; }

  #nama-custom { margin-top:5px; display:none; }
  #nama-custom.visible { display:block; }

  .divider { height:1px; background:var(--border); margin:8px 0; }

  .btn-submit { width:100%; background:linear-gradient(135deg,var(--blue) 0%,#1e40af 100%); color:var(--white); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; padding:11px; border:none; border-radius:10px; cursor:pointer; margin-top:10px; box-shadow:0 4px 14px rgba(26,86,219,.35); transition:transform .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-submit:active { transform:scale(.98); }
  .btn-submit:disabled { opacity:.6; pointer-events:none; }
  .spinner { width:16px; height:16px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .btn-submit.loading .spinner { display:block; }
  .btn-submit.loading .btn-text { display:none; }

  #success-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,.93); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:14px; text-align:center; padding:32px; }
  #success-overlay.show { display:flex; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .success-icon { width:72px; height:72px; background:linear-gradient(135deg,var(--success),#059669); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:0 0 36px rgba(16,185,129,.4); }
  .success-title { font-size:22px; font-weight:800; color:var(--white); }
  .success-msg { font-size:13.5px; color:rgba(255,255,255,.6); line-height:1.6; }
  .btn-again { margin-top:6px; padding:12px 28px; background:var(--accent); color:var(--navy); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; border:none; border-radius:100px; cursor:pointer; }

  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(70px); background:#EF4444; color:#fff; padding:10px 18px; border-radius:100px; font-size:13px; font-weight:600; z-index:1000; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; max-width:92vw; text-align:center; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  input::placeholder { color:#b0bec5; }
</style>
</head>
<body>

<div class="header">
  <h1>DAFTAR HADIR BATCH 1</h1>
  <h2>PTM Manajemen Risiko Modul 1-2</h2>
  <h2>20-21 Apr'26, Kantor Perbarindo DPD Jateng</h2>
</div>

<div class="card">
  <form id="mainForm" novalidate>

    <div class="field">
      <label>Nama BPR/BPRS <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="nama_bpr" required>
          <option value="">— Pilih BPR/BPRS —</option>
<option>PT BPR ARTHAPUSPA MEGA</option>
<option>PT. BPR Bina Sejahtera Insani</option>
<option>PT. BPR Catur Artha Jaya</option>
<option>KBPR WEDARIJAKSA</option>
<option>PT. BPR Dhana Mitratama, Blora</option>
<option>PT BPR SEMERU</option>
<option>PT. BPR Artha Huda Abadi</option>
<option>PT BPR BKK TEMANGGUNG ( PERSERODA )</option>
<option>PT. BPR Nusamba Pecangaan</option>
<option>PT. BPR Citra Darian</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Nama Peserta <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="nama_peserta_select">
          <option value="">— Pilih Nama —</option>
<option>Moh. Syaefudin Munir, S. Sos</option>
<option>ANISAH FITRIYANI</option>
<option>AGUNG SUPRIYANTO</option>
<option>NASROTUL HUSNA</option>
<option>Yunita Nurbayanti</option>
<option>Hernita Kusuma Wardani, S.Si</option>
<option>Suwarto, A.Md.</option>
<option>Marchim Mella Cristina</option>
<option>ANDI IRAWAN, SE</option>
<option>ELI NURIDA, SE, MM, AKT</option>
<option>Anton Surya Jaya, S.H, M. A. B</option>
<option>ERLINA PUSPITA SARI</option>
<option>NUR AINI DWI PURWITASARI</option>
<option>ACH. JUPRI</option>
<option>Dyah Ayu Pratiwi</option>
<option>Arlin Ayu Prina Damayanti</option>
<option>DEA ANANDA PUTRI, A.Md.Bns.</option>
<option>Agung Ginanjar</option>
<option>Agung Suprayogi</option>
<option>Yuni Tri Ariyanto</option>
          <option value="__lainnya__">✏️ Ketik manual...</option>
        </select>
      </div>
      <input type="text" id="nama-custom" placeholder="Ketik nama lengkap...">
    </div>

    <div class="field">
      <label>Jabatan <span class="req">*</span></label>
      <input type="text" id="jabatan" placeholder="Contoh: Direktur, Staf Kepatuhan...">
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Jenis Kelamin <span class="req">*</span></label>
      <div class="radio-group col2">
        <div class="radio-opt"><input type="radio" name="jk" id="laki" value="Laki-laki"><label for="laki">♂ Laki-laki</label></div>
        <div class="radio-opt"><input type="radio" name="jk" id="perempuan" value="Perempuan"><label for="perempuan">♀ Perempuan</label></div>
      </div>
    </div>

    <div class="field">
      <label>Rentang Umur <span class="req">*</span></label>
      <div class="radio-group col4">
        <div class="radio-opt"><input type="radio" name="umur" id="u1" value="&lt;15 tahun"><label for="u1">&lt;15</label></div>
        <div class="radio-opt"><input type="radio" name="umur" id="u2" value="15-24 tahun"><label for="u2">15–24</label></div>
        <div class="radio-opt"><input type="radio" name="umur" id="u3" value="25-55 tahun"><label for="u3">25–55</label></div>
        <div class="radio-opt"><input type="radio" name="umur" id="u4" value="&gt;55 tahun"><label for="u4">&gt;55</label></div>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="btnSubmit">
      <div class="spinner"></div>
      <span class="btn-text">✔ Konfirmasi Kehadiran</span>
    </button>

  </form>
</div>

<div id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-title">Kehadiran Tercatat!</div>
  <div class="success-msg" id="success-msg"></div>
  <button class="btn-again" onclick="resetForm()">Daftarkan Peserta Lain</button>
</div>
<div id="toast"></div>

<script>
  // ── GANTI URL INI dengan URL deployment GAS Anda ──────────────
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyJF5b9lgPZf5od3k8ZTcv-6JLgFVwTAq8MSiXwFxhDZwhXuAC7FjQM8Oy1jXvMgbyU/exec";
  // ──────────────────────────────────────────────────────────────

  const PELATIHAN = "PTM Manajemen Risiko Modul 1-2, Implementasi GRC & Budaya Sadar Risiko sesuai Roadmap OJK 2024-2027";
  const TANGGAL   = "20-21 April 2026";
  const TEMPAT    = "Kantor Perbarindo DPD Jawa Tengah";

  const sel    = document.getElementById('nama_peserta_select');
  const custom = document.getElementById('nama-custom');

  sel.addEventListener('change', () => {
    if (sel.value === '__lainnya__') { custom.classList.add('visible'); custom.focus(); }
    else { custom.classList.remove('visible'); custom.value = ''; }
  });

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function validate() {
    if (!document.getElementById('nama_bpr').value)          { toast('⚠ Pilih nama BPR/BPRS'); return false; }
    if (!sel.value)                                           { toast('⚠ Pilih nama peserta'); return false; }
    if (sel.value === '__lainnya__' && !custom.value.trim())  { toast('⚠ Ketik nama peserta'); return false; }
    if (!document.getElementById('jabatan').value.trim())    { toast('⚠ Jabatan wajib diisi'); return false; }
    if (!document.querySelector('input[name="jk"]:checked'))   { toast('⚠ Pilih jenis kelamin'); return false; }
    if (!document.querySelector('input[name="umur"]:checked')) { toast('⚠ Pilih rentang umur'); return false; }
    return true;
  }

  document.getElementById('mainForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) return;

    const btn = document.getElementById('btnSubmit');
    btn.classList.add('loading'); btn.disabled = true;

    const nama = sel.value === '__lainnya__' ? custom.value.trim() : sel.value;
    const ts   = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

    // ── FIX: kirim sebagai application/x-www-form-urlencoded ──
    // Format ini paling reliable dengan mode:'no-cors' + GAS e.parameter
    const params = new URLSearchParams({
      pelatihan    : PELATIHAN,
      tanggal      : TANGGAL,
      tempat       : TEMPAT,
      nama_bpr     : document.getElementById('nama_bpr').value,
      nama_peserta : nama,
      jabatan      : document.getElementById('jabatan').value.trim(),
      jenis_kelamin: document.querySelector('input[name="jk"]:checked').value,
      rentang_umur : document.querySelector('input[name="umur"]:checked').value,
      timestamp    : ts
    });

    try {
      await fetch(GAS_URL, {
        method : 'POST',
        mode   : 'no-cors',                                        // wajib untuk GAS
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body   : params.toString()
      });
      // no-cors → response selalu opaque, anggap sukses jika tidak throw
      document.getElementById('success-msg').innerHTML =
        '<b>' + nama + '</b> berhasil dicatat.<br>Selamat mengikuti pelatihan! 🎉';
      document.getElementById('success-overlay').classList.add('show');
    } catch (err) {
      toast('❌ Gagal mengirim. Periksa koneksi internet.');
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
  });

  function resetForm() {
    document.getElementById('mainForm').reset();
    custom.classList.remove('visible'); custom.value = '';
    document.getElementById('success-overlay').classList.remove('show');
  }
</script>
</body>
</html>
