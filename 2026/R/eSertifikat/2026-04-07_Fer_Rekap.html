
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rekap Peserta</title>
  <style>
    /* ---------- DESIGN TOKEN ---------- */
    :root{
      --accent:#06f;
      --text:#222;
      --sub:#555;
      --radius:4px;
      --shadow:0 1px 1px rgba(0,0,0,.12);
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --fs:.6rem;
      --gap:.25rem;
    }
    /* ---------- RESET ---------- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font:inherit}
    body{
      font-family:var(--font);font-size:var(--fs);color:var(--text);
      background:transparent;
      display:flex;flex-direction:column;height:100vh;line-height:1.3;
      -webkit-font-smoothing:antialiased;
    }
    /* ---------- TOP BAR ---------- */
    header{
      position:sticky;top:0;z-index:10;
      display:flex;gap:var(--gap);align-items:center;
      padding:4px 6px;
      background:rgba(255,255,255,.55);backdrop-filter:blur(4px);
      border-bottom:1px solid rgba(0,0,0,.05);
    }
    #searchInput{
      flex:1;padding:4px 8px;border:1px solid rgba(0,0,0,.12);
      border-radius:var(--radius);font-size:var(--fs);
      background:rgba(255,255,255,.6);
    }
    #searchInput:focus{outline:none;border-color:var(--accent)}
    .icon-btn{
      width:22px;height:22px;padding:3px;border:none;background:none;
      cursor:pointer;border-radius:var(--radius);
      display:grid;place-content:center;
    }
    .icon-btn:hover{background:rgba(0,0,0,.06)}
    .icon-btn svg{
      width:14px;height:14px;stroke:var(--accent);stroke-width:2;fill:none;
    }
    /* ---------- TABLE ---------- */
    main{flex:1;overflow:auto;padding:0 2px 2px}
    .table-wrapper{min-width:100%;overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th,td{padding:5px 6px;text-align:left;white-space:wrap}
    th{
      position:sticky;top:0;
      background:rgba(255,240,240,.7);backdrop-filter:blur(3px);
      font-weight:600;border-bottom:1px solid rgba(0,0,0,.08);
    }
    tbody tr{border-bottom:1px solid rgba(0,0,0,.04)}
    tbody tr:hover{background:rgba(0,0,0,.02)}
    tbody tr.new{animation:fadeNew .5s}
    @keyframes fadeNew{from{background:#c8f5d0}to{background:transparent}}
    td img,th img{width:20px;height:20px;object-fit:cover;border-radius:var(--radius)}
    .loading{text-align:center;padding:8px;color:var(--sub);font-size:.55rem}
    /* ---------- PAGINASI ---------- */
    #pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:6px 0 8px}
    #pagination button{
      padding:4px 8px;border:1px solid var(--accent);background:#fff;
      color:var(--accent);border-radius:var(--radius);font-size:var(--fs);
      cursor:pointer;box-shadow:var(--shadow);transition:all .15s;
    }
    #pagination button:disabled{opacity:.4;cursor:not-allowed}
    #pagination button:not(:disabled):hover{background:var(--accent);color:#fff}
    #pageInfo{font-weight:600;color:var(--sub)}
  </style>
</head>
<body>
  <header>
    <input id="searchInput" placeholder="Cari nama BPR/S atau peserta…" autocomplete="off">
    <button id="refreshBtn" class="icon-btn" title="Refresh">
      <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
  </header>

  <main>
    <div class="loading" id="loading">Memuat data…</div>
    <div class="table-wrapper" id="tableWrapper">
      <table id="dataTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="pagination" style="display:none">
      <button id="prevBtn">‹ Sebelumnya</button>
      <span id="pageInfo"></span>
      <button id="nextBtn">Berikutnya ›</button>
    </div>
  </main>

  <script>
    /* ---------- CONFIG ---------- */
    const ROWS_PER_PAGE = 10;
    const ENDPOINT = 'https://script.google.com/macros/s/AKfycbw4vzsTi5xhFkP30V_61B96TwBolYQV9GGxpoo0wZh4AGglIECgRw3ynADXkwXvDutD/exec';
    let cache = [], lastSerial = '', currentPage = 1, filtered = [];

    /* ---------- FETCH ---------- */
    async function pull(){
      try{
        const r = await fetch(ENDPOINT + '?t=' + Date.now(), {cache:'no-store'});
        const raw = await r.json();
        const serial = JSON.stringify(raw);
        if(serial === lastSerial) return;
        lastSerial = serial;
        cache = raw;
        currentPage = 1;
        render();
        loading.style.display='none';
        pagination.style.display='flex';
      }catch(e){
        loading.textContent='Gagal memuat, coba lagi…';
      }
    }

    /* ---------- RENDER ---------- */
    function render(){
      const key = searchInput.value.trim().toLowerCase();
      filtered = cache.filter((row,idx)=>{
        if(idx===0) return true;
        return row.join(' ').toLowerCase().includes(key);
      });
      const totalRows = filtered.length - 1;
      const totalPages = Math.max(1, Math.ceil(totalRows / ROWS_PER_PAGE));
      if(currentPage > totalPages) currentPage = totalPages;
      if(currentPage < 1) currentPage = 1;
      const start = 1 + (currentPage-1)*ROWS_PER_PAGE;
      const end   = Math.min(start + ROWS_PER_PAGE - 1, totalRows);

      const head = dataTable.tHead, body = dataTable.tBodies[0];
      head.innerHTML=''; body.innerHTML='';

      filtered.forEach((row,idx)=>{
        if(idx===0){
          const tr=document.createElement('tr');
          row.forEach(cell=>{ const th=document.createElement('th'); th.textContent=cell; tr.appendChild(th); });
          head.appendChild(tr); return;
        }
        if(idx < start || idx > end) return;
        const tr=document.createElement('tr');
        row.forEach(cell=>{
          const td=document.createElement('td');
          if(/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)/i.test(cell)){
            const img=new Image(); img.src=cell; img.alt='foto'; img.width=20; img.height=20; img.loading='lazy';
            td.appendChild(img);
          }else td.textContent=cell;
          tr.appendChild(td);
        });
        const sig=row.join('|');
        if(!window.seenRows) window.seenRows=new Set();
        if(!window.seenRows.has(sig)){ tr.classList.add('new'); window.seenRows.add(sig); }
        body.appendChild(tr);
      });

      pageInfo.textContent=`Hal ${currentPage} / ${totalPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
      tableWrapper.scrollTop = 0;
    }

    /* ---------- EVENT ---------- */
    searchInput.addEventListener('input', ()=>{ currentPage=1; render(); });
    refreshBtn.addEventListener('click', pull);
    prevBtn.addEventListener('click', ()=>{ currentPage--; render(); });
    nextBtn.addEventListener('click', ()=>{ currentPage++; render(); });

    /* ---------- INIT ---------- */
    pull();
  </script>
</body>
</html>
